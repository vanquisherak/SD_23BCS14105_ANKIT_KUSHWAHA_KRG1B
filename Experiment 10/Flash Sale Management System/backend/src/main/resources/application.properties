spring.application.name=flash-sale-backend
server.port=8090

# Fill these values when credentials are available.
spring.datasource.url=jdbc:mysql://localhost:3306/flash_sale_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

flashsale.rate-limit.max-requests=5
flashsale.rate-limit.window-seconds=5
flashsale.order.expiry-minutes=10
flashsale.queue.key=FLASHSALE:CHECKOUT:QUEUE
